profiles:
  intelligence_artificielle:
    name: Intelligence Artificielle
    icon: 🤖
    description: LLM, agents autonomes, deep learning, NLP, computer vision
    keywords:
    - intelligence artificielle
    - LLM
    - agent autonome
    - LangChain
    - OpenAI
    - RAG
    - fine-tuning
    - Mistral
    - Claude
    - machine learning
    - deep learning
    - transformer
    - neural network
    - GPT
    - prompt engineering
    - agentic
    - multimodal
    - embedding
    sources:
      hackernews:
        enabled: true
        query: AI OR LLM OR machinelearning OR LangChain OR agent OR embedding
        hits_per_page: 15
        weight: 1.3
      reddit:
        enabled: true
        subreddits:
        - MachineLearning
        - LocalLLaMA
        - artificial
        - singularity
        limit: 10
        weight: 1.1
      rss_feeds:
        enabled: true
        feeds:
        - name: The Batch (DeepLearning.AI)
          url: https://www.deeplearning.ai/the-batch/feed/
          weight: 1.4
        - name: Hugging Face Blog
          url: https://huggingface.co/blog/feed.xml
          weight: 1.3
        - name: Ars Technica AI
          url: https://feeds.arstechnica.com/arstechnica/technology
          weight: 1.0
        - name: MIT Tech Review AI
          url: https://www.technologyreview.com/topic/artificial-intelligence/feed
          weight: 1.2
        max_entries_per_feed: 8
      devto:
        enabled: true
        tags:
        - ai
        - machinelearning
        per_page: 10
        weight: 1.2
      github:
        enabled: true
        query: AI OR LLM OR machine-learning OR agent OR embedding
        per_page: 8
        weight: 1.1
      lobsters:
        enabled: true
        tags:
        - ml
        limit: 10
        weight: 1.25
      arxiv:
        enabled: true
        query: large language model OR agent AI OR multimodal
        max_results: 6
        weight: 1.4
