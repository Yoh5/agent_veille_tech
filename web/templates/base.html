<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Veille Tech{% endblock %}</title>
  <script>
    (function() {
      var t = localStorage.getItem('vt-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">
      <div class="nav-logo">📡</div>
      Veille Tech
    </a>
    <div class="nav-right">
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Changer le thème" aria-label="Changer le thème">
        <svg id="icon-moon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="icon-sun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <a href="/api/status" class="nav-pill" target="_blank">API</a>
      <a href="/docs" class="nav-pill" target="_blank">Docs</a>
    </div>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <script>
    function toggleTheme() {
      var html = document.documentElement;
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('vt-theme', next);
      _syncIcons(next);
    }
    function _syncIcons(theme) {
      var moon = document.getElementById('icon-moon');
      var sun  = document.getElementById('icon-sun');
      if (!moon || !sun) return;
      moon.style.display = theme === 'dark'  ? '' : 'none';
      sun.style.display  = theme === 'light' ? '' : 'none';
    }
    _syncIcons(document.documentElement.getAttribute('data-theme') || 'dark');
  </script>
</body>
</html>
